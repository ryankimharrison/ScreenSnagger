name: ScreenSnagger
options:
  bundleIdPrefix: com.ryanharrison
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "15.0"

targets:
  ScreenSnagger:
    type: application
    platform: macOS
    sources:
      - Sources
      - Resources/Assets.xcassets
    resources:
      - path: Resources/Info.plist
        buildPhase: none
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryanharrison.screensnagger
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/ScreenSnagger.entitlements
        CODE_SIGN_STYLE: Automatic
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        SWIFT_VERSION: "5.10"
        PRODUCT_NAME: ScreenSnagger
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_APP_SANDBOX: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
