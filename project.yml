name: ScreenSnag
options:
  bundleIdPrefix: com.ryanharrison
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "15.0"

targets:
  ScreenSnag:
    type: application
    platform: macOS
    sources:
      - Sources
    resources:
      - path: Resources/Info.plist
        buildPhase: none
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryanharrison.screensnag
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/ScreenSnag.entitlements
        CODE_SIGN_STYLE: Automatic
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        SWIFT_VERSION: "5.10"
        PRODUCT_NAME: ScreenSnag
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_APP_SANDBOX: NO
